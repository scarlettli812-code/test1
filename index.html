<!doctype html> <html lang="zh-CN"> <head>   <meta charset="utf-8" />   <meta name="viewport" content="width=device-width,initial-scale=1" />   <title>能量脚本测评</title>   <style>     :root{       --bg:#0b0f17; --card:#111827; --card2:#0f172a; --text:#e5e7eb; --muted:#9ca3af;       --accent:#8b5cf6; --accent2:#22c55e; --danger:#ef4444; --border:#1f2937;       --shadow: 0 10px 30px rgba(0,0,0,.35);       --radius: 18px;       --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;     }     *{box-sizing:border-box}     body{margin:0; background: radial-gradient(1200px 800px at 20% 10%, rgba(139,92,246,.28), transparent 60%), var(--bg); color:var(--text); font-family:system-ui, sans-serif; line-height:1.5;}     .wrap{max-width:980px; margin:0 auto; padding:22px;}     .topbar{display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:18px;}     .brand{display:flex; align-items:center; gap:10px;}     .logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg, #8b5cf6, #22c55e); box-shadow:var(--shadow);}     .title{font-size:18px; font-weight:700}     .pill{border:1px solid var(--border); background:rgba(17,24,39,.6); padding:8px 10px; border-radius:999px; font-size:12px; color:var(--muted);}     .grid{display:grid; grid-template-columns: 1.2fr .8fr; gap:16px;}     @media (max-width: 900px){ .grid{grid-template-columns: 1fr} }     .card{background:linear-gradient(180deg, rgba(17,24,39,.92), rgba(15,23,42,.92)); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:18px;}     .hr{height:1px;background:var(--border); margin:14px 0}     button{appearance:none; border:1px solid var(--border); background:rgba(17,24,39,.6); color:var(--text); padding:10px 12px; border-radius:14px; cursor:pointer; font-weight:650;}     button.primary{background:linear-gradient(135deg, rgba(139,92,246,.95), rgba(34,197,94,.85)); border-color:transparent;}     .input{ width:100%; border:1px solid var(--border); background:rgba(15,23,42,.6); color:var(--text); padding:10px 12px; border-radius:14px; outline:none; margin-bottom:10px;}     .tag{display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:999px; border:1px solid var(--border); background:rgba(17,24,39,.55); font-size:12px; color:var(--muted);}     .progress{height:10px; background:rgba(31,41,55,.8); border:1px solid var(--border); border-radius:999px; overflow:hidden;}     .bar{height:100%; width:0%; background:linear-gradient(90deg, #8b5cf6, #22c55e);}     .options{display:flex; flex-direction:column; gap:10px; margin-top:12px;}     .opt{ text-align:left; padding:12px; border-radius:16px; border:1px solid var(--border); background:rgba(17,24,39,.55); cursor:pointer; }     .opt.selected{border-color: #22c55e; background: rgba(34,197,94,.08)}     .resultgrid{display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:10px;}     .metric{border:1px solid var(--border); background:rgba(15,23,42,.55); border-radius:16px; padding:12px;}     .meter{height:10px; border-radius:999px; background:rgba(31,41,55,.85); overflow:hidden;}     .error{color:#ef4444; font-size:13px; margin-top:10px;}     .ok{color:#22c55e; font-size:13px; margin-top:10px;}   </style> </head> <body> <div class="wrap">   <div class="topbar">     <div class="brand"><div class="logo"></div><div><div class="title">能量脚本测评</div></div></div>     <div class="pill">进度：<strong id="pillProgress">0/45</strong></div>   </div>   <div class="grid">     <div class="card" id="leftCard">       <h2>请输入激活码</h2>       <p>本测评为付费内容，请输入您购买的激活码以开启。</p>     </div>     <div class="card" id="rightCard">       <label class="small">填写激活码</label>       <input id="codeInput" class="input" placeholder="ABCD-EFGH" />       <button class="primary" style="width:100%" id="btnActivate">激活并开始</button>       <div id="activateMsg"></div>       <div class="hr"></div>       <p style="font-size:12px; color:var(--muted)">提示：一码一用，请勿泄露给他人。如有疑问请联系客服。</p>     </div>   </div> </div> <script>
/** 题库数据 (简化显示，保持你原有的45题即可) **/
const questions = [
    { d: 'Worth', s: 'Money', t: "当你意外获得一笔丰厚的奖金，钱到账那一瞬间的真实体感是？", o: ["A. 极度不安，觉得必须立刻花掉","B. 怀疑与恐慌，觉得自己不值这么多","C. 略带压力，觉得自己必须加倍努力","D. 平静的惊喜，觉得好运很正常"] },
    // ... 后面请自行补充你那45个题目的完整数据 ...
    { d: 'Limits', s: 'Body', t: "假如被诊断出需要长期调理的亚健康状况，你的底层信念是？", o: ["A. 疾病认同，觉得这辈子就这样了","B. 放弃主权，把希望全寄托在外部药物","C. 无奈接受，学会忍受痛苦","D. 自愈信念，相信这是身体在提醒我改变"] }
];

let state = { activated: false, idx: 0, answers: Array(questions.length).fill(null) };

// 核心：开启服务器模式
const USE_SERVER = true; 

const leftCard = document.getElementById("leftCard");
const codeInput = document.getElementById("codeInput");
const btnActivate = document.getElementById("btnActivate");
const activateMsg = document.getElementById("activateMsg");

btnActivate.addEventListener("click", async () => {
    const code = codeInput.value.trim();
    if(!code) return alert("请输入码");
    
    btnActivate.disabled = true;
    btnActivate.textContent = "验证中...";
    
    try {
        const res = await fetch("/api/redeem", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ code })
        });
        const data = await res.json();
        if(data.ok) {
            state.activated = true;
            document.getElementById("rightCard").style.display = "none";
            renderQuiz();
        } else {
            activateMsg.innerHTML = `<div class="error">${data.msg}</div>`;
        }
    } catch (e) {
        alert("网络请求失败");
    } finally {
        btnActivate.disabled = false;
        btnActivate.textContent = "激活并开始";
    }
});

function renderQuiz() {
    const q = questions[state.idx];
    const done = state.answers.filter(x=>x!=null).length;
    const pct = Math.round((done/questions.length)*100);
    document.getElementById("pillProgress").textContent = `${done}/${questions.length}`;

    leftCard.innerHTML = `
        <h2>${q.t}</h2>
        <div class="progress"><div class="bar" style="width:${pct}%"></div></div>
        <div class="options">
            ${q.o.map((text, i) => `<div class="opt" onclick="pick(${i})">${text}</div>`).join("")}
        </div>
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button onclick="prev()" ${state.idx===0?'disabled':''}>上一题</button>
            ${done === questions.length ? '<button class="primary" onclick="renderResult()">查看结果</button>' : ''}
        </div>
    `;
}

window.pick = (i) => {
    state.answers[state.idx] = i;
    if(state.idx < questions.length - 1) {
        state.idx++;
        renderQuiz();
    } else {
        renderQuiz();
    }
};

window.prev = () => { if(state.idx > 0) { state.idx--; renderQuiz(); } };

function renderResult() {
    // 这里复用你原来的计算分数逻辑即可
    leftCard.innerHTML = `<h2>测评完成</h2><p>您的能量报告已生成。</p><button onclick="location.reload()">重新测评</button>`;
}
</script> </body> </html>

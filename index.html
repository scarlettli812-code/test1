<!doctype html> <html lang="zh-CN"> <head>   <meta charset="utf-8" />   <meta name="viewport" content="width=device-width,initial-scale=1" />   <title>能量脚本测评（完整版）</title>   <style>     :root{       --bg:#0b0f17; --card:#111827; --card2:#0f172a; --text:#e5e7eb; --muted:#9ca3af;       --accent:#8b5cf6; --accent2:#22c55e; --danger:#ef4444; --border:#1f2937;       --shadow: 0 10px 30px rgba(0,0,0,.35);       --radius: 18px;       --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;     }     *{box-sizing:border-box}     body{margin:0; background: radial-gradient(1200px 800px at 20% 10%, rgba(139,92,246,.28), transparent 60%), var(--bg); color:var(--text); font-family:system-ui, -apple-system, sans-serif; line-height:1.5;}     .wrap{max-width:980px; margin:0 auto; padding:22px;}     .topbar{display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:18px;}     .brand{display:flex; align-items:center; gap:10px;}     .logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg, #8b5cf6, #22c55e); box-shadow:var(--shadow);}     .title{font-size:18px; font-weight:700}     .pill{border:1px solid var(--border); background:rgba(17,24,39,.6); padding:8px 10px; border-radius:999px; font-size:12px; color:var(--muted);}     .grid{display:grid; grid-template-columns: 1.2fr .8fr; gap:16px;}     @media (max-width: 900px){ .grid{grid-template-columns: 1fr} }     .card{background:linear-gradient(180deg, rgba(17,24,39,.92), rgba(15,23,42,.92)); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:24px;}     .hr{height:1px;background:var(--border); margin:14px 0}     button{appearance:none; border:1px solid var(--border); background:rgba(17,24,39,.6); color:var(--text); padding:10px 14px; border-radius:14px; cursor:pointer; font-weight:650;}     button.primary{background:linear-gradient(135deg, #8b5cf6, #22c55e); border-color:transparent; color:white;}     button:disabled{opacity:.5; cursor:not-allowed;}     .input{ width:100%; border:1px solid var(--border); background:rgba(15,23,42,0.6); color:var(--text); padding:12px; border-radius:14px; outline:none; margin-bottom:10px;}     .tag{display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:999px; border:1px solid var(--border); background:rgba(17,24,39,0.55); font-size:12px; color:var(--muted);}     .progress{height:10px; background:rgba(31,41,55,.8); border:1px solid var(--border); border-radius:999px; overflow:hidden; margin:10px 0;}     .bar{height:100%; width:0%; background:linear-gradient(90deg, #8b5cf6, #22c55e); transition: width .3s;}     .options{display:flex; flex-direction:column; gap:10px; margin-top:20px;}     .opt{ text-align:left; padding:16px; border-radius:16px; border:1px solid var(--border); background:rgba(17,24,39,.55); cursor:pointer; font-size:15px; }     .opt:hover{ border-color: #8b5cf6; background: rgba(139,92,246,0.1); }     .opt.selected{ border-color: #22c55e; background: rgba(34,197,94,0.15); }     .resultgrid{display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:20px;}     @media (max-width: 720px){ .resultgrid{grid-template-columns:1fr} }     .metric{border:1px solid var(--border); background:rgba(15,23,42,.55); border-radius:16px; padding:16px;}     .meter{height:10px; border-radius:999px; background:rgba(31,41,55,.85); overflow:hidden;}     .error{padding:10px; border-radius:10px; border:1px solid rgba(239,68,68,.35); background:rgba(239,68,68,0.12); color:#fca5a5; font-size:13px; margin-top:10px;}     .footer{margin-top:24px; color:var(--muted); font-size:12px; text-align:center;}   </style> </head> <body> <div class="wrap">   <div class="topbar">     <div class="brand"><div class="logo"></div><div><div class="title">能量脚本测评</div></div></div>     <div class="pill">进度：<strong id="pillProgress">0/60</strong></div>   </div>   <div class="grid">     <!-- 左侧动态区域 -->     <div class="card" id="leftCard">       <h2>激活测评</h2>       <p style="color:var(--muted)">请输入激活码以开启 60 道能量脚本深度分析题。包含金钱、关系、事业、身体四大领域。</p>     </div>     <!-- 右侧激活区域 -->     <div class="card" id="rightCard">       <label style="font-size:12px; color:var(--muted)">激活码</label>       <input id="codeInput" class="input" placeholder="请输入您的激活码" />       <button class="primary" style="width:100%" id="btnActivate">激活并开始</button>       <div id="activateMsg"></div>       <div class="hr"></div>       <p style="font-size:11px; color:var(--muted)">提示：一码一用。激活后题目将自动加载，请在静心状态下完成。</p>     </div>   </div> </div> <script>
/** =========================
 *  0) 完整 60 题库
 * ========================= */
const questions = [
    { d: 'Worth', s: 'Money', t: "当你几乎没有付出什么“辛苦努力”，却意外获得了一笔丰厚的奖金或馈赠，钱到账的那一瞬间，你的真实体感是？", o: ["A. 极度不安。感觉这钱“烫手”，甚至心慌意乱，觉得“天降横财必有横祸”。", "B. 怀疑与恐慌。“是不是搞错了？我不值这么多”，完全不敢动。", "C. 略带压力。收下了但心里发誓以后肯定没这好事，必须加倍努力才配得上。", "D. 平静的惊喜。就像收到当月工资一样自然，开心地规划用途。"] },
    { d: 'Worth', s: 'Money', t: "当你终于买下那件昂贵但非必需的“梦中情物”（如名牌包）后，那一小时内的状态是？", o: ["A. 强烈的罪恶感。内心攻击自己太败家，甚至想立刻退货。", "B. 补偿心理。立刻制定“惩罚计划”，接下来的一个月必须吃土。", "C. 需要理由。需要反复强调它的实用性，试图用逻辑说服大脑这钱花得对。", "D. 纯粹的喜悦。欣赏它的质感，完全没有关于价格的心理负担。"] },
    { d: 'Worth', s: 'Money', t: "当客户或老板主动提出给你高于预期的报酬，且没有附加额外工作要求时？", o: ["A. 下意识拒绝。“不不不，太多了，我不值这个价”。", "B. 恐慌性补偿。勉强收下但心里极度恐慌，于是拼命主动加班。", "C. 窃喜带疑。开心但心里嘀咕“他们是不是不知道我其实没那么厉害”。", "D. 大方致谢。平静地确认“是的，我的专业能力和服务值得这个价格”。"] },
    { d: 'Scarcity', s: 'Money', t: "每月支付房租、房贷或大额账单的一瞬间，哪怕余额足够，你的身体感受是？", o: ["A. 躯体紧缩。胸口发闷，感觉付出去就像在割肉或放血。", "B. 怨气冲天。一边付款一边在心里咒骂“怎么这么贵”。", "C. 情感隔离。没什么痛感，但完全屏蔽了感觉，不敢细想余额。", "D. 轻松流动。内心舒展，感谢这笔钱换来了舒适的居住空间。"] },
    { d: 'Scarcity', s: 'Money', t: "刷朋友圈看到同龄人晒豪车或巨额收益截图时，你脑海冒出的第一个念头？", o: ["A. 恶意揣测。“肯定是不义之财/P图骗人的”，必须妖魔化对方。", "B. 瞬间萎缩。觉得自己是个废物，感叹世界不公，焦虑感爆棚。", "C. 心理隔离。“挺好的，但这种生活离我很远”，不信自己能拥有。", "D. 欣赏与好奇。觉得这挺酷的，将其视为一种可能性的参照。"] },
    { d: 'Scarcity', s: 'Money', t: "面对“满1000减200”或“买一送一”的大促，你通常会？", o: ["A. 恐慌性囤积。被“不买就是亏”焦虑驱动，囤了一堆用不完的。", "B. 贪便宜心理。为了折扣，硬是凑单买了几件其实不太喜欢的商品。", "C. 轻微动摇。会被诱惑多看几眼，稍微多买了一点日用品。", "D. 核心聚焦。只买原本计划需要的高品质商品，不被折扣标签绑架。"] },
    { d: 'Control', s: 'Money', t: "对于你的存款余额或理财账户，你查看的频率和当下的心情是？", o: ["A. 强迫性查看。每天看好几次，数字下跌一点都会让我极度恐慌。", "B. 依赖性查看。每天睡前必须看一眼，确认数字在才能踏实。", "C. 定期复盘。每周或每月看一次，环境差时心里会打鼓。", "D. 信任与放手。长期持有，相信财富有它自己的增长周期。"] },
    { d: 'Control', s: 'Money', t: "如果有人向你推荐一个你完全不熟悉但很有潜力的赚钱新机会？", o: ["A. 僵化防御。“不在计划内的都是风险”，直接拒绝了解。", "B. 焦虑纠结。想试又不敢试，反复分析利弊直到机会溜走。", "C. 谨慎观望。保持关注，但需要看到身边有人成功了才敢投。", "D. 开放评估。如果评估后觉得可行且有趣，会欣然尝试。"] },
    { d: 'Control', s: 'Money', t: "在旅行中因为不可抗力导致预算超支了20%，你的反应？", o: ["A. 情绪崩溃。暴怒或极度焦虑，不停指责自己或同伴。", "B. 惩罚性止损。为了弥补缺口，强行砍掉后面所有精彩体验项目。", "C. 事后反刍。虽然接受了，但心里始终有个疙瘩，时不时念叨。", "D. 弹性调整。“既然发生了就是最好的安排”，享受独特的体验。"] },
    { d: 'Victim', s: 'Money', t: "深夜独自一人时，你认为目前阻碍你实现财富自由的最大原因是？", o: ["A. 宿命论。“因为我没有富爸爸/命不好”，认为阶级已经固化。", "B. 环境归因。“现在经济形势太差/行业不行”，觉得外部在针对自己。", "C. 责任转移。“要不是为了家庭孩子，我早就飞黄腾达了”。", "D. 内控点。“是我当下的认知还没匹配那个量级的财富”。"] },
    { d: 'Victim', s: 'Money', t: "假如遭遇了理财亏损或被人借钱不还，你的长期反应是？", o: ["A. 受害上瘾。逢人就诉苦，沉浸在“为什么倒霉的总是我”。", "B. 情绪消耗。脑子全全是怨恨念头，消耗大量精力去恨对方。", "C. 创伤残留。自认倒霉，但潜意识留下了不信任任何人的阴影。", "D. 成长复盘。反思是自己哪个贪念导致决策，吸取教训翻篇。"] },
    { d: 'Victim', s: 'Money', t: "当你有机会进入一个高净值人群（富人）的社交场合？", o: ["A. 被迫害妄想。觉得他们看不起我或想割我，想逃离。", "B. 自我矮化。觉得人家是资源互换我啥也没有，躲在角落不说话。", "C. 虚假自我。觉得低人一等，需伪装或吹嘘实力才能被接纳。", "D. 自信配对。“既然我在这里，说明我的能量与此匹配”。"] },
    { d: 'Limits', s: 'Money', t: "闭上眼，想象你的年收入突然翻了10倍，第一个念头？", o: ["A. 代价恐惧。“那一定会累死/失去健康”，深信巨富必有巨大牺牲。", "B. 理性扼杀。“这根本不科学”，大脑立即寻找证据证明是幻想。", "C. 勤劳陷阱。“那我得打多少份工啊”，只想着用辛苦模式堆叠。", "D. 愿景接纳。感觉到轻松自由，觉得这是我未来的自然状态。"] },
    { d: 'Limits', s: 'Money', t: "潜意识深处，关于“善良”与“有钱”的关系？", o: ["A. 道德审判。为富不仁，做好人注定清贫。", "B. 清高防御。谈钱太俗，追求财富会污染灵魂纯洁度。", "C. 风险预设。觉得有了钱不一定变坏，但会带来麻烦纷争。", "D. 能量中性。钱是放大镜，会让善良的人更有能力行善。"] },
    { d: 'Limits', s: 'Money', t: "面对“被动收入”这些概念时，你的想法？", o: ["A. 苦行僧思维。只有流汗辛苦赚的钱才是干净的。", "B. 自我设限。觉得那是天才的特权，跟我无关。", "C. 知行脱节。想要相信但不知怎么做，习惯于苦干。", "D. 杠杆思维。相信找对价值点，财富自然会流向我。"] },
    { d: 'Worth', s: 'Rel', t: "当伴侣极其真诚、热烈地赞美你的魅力或才华时？", o: ["A. 防御抵触。浑身不自在，觉得对方要么讽刺我，要么有所图。", "B. 冒充者综合征。立刻列举出一堆缺点来反驳对方。", "C. 接受障碍。礼貌谢但心里没吃进去，觉得他带了滤镜。", "D. 自我确认。全然接收，享受这份能量流动。"] },
    { d: 'Worth', s: 'Rel', t: "你已疲惫，但伴侣提出希望你做家务或满足某种需求？", o: ["A. 讨好牺牲。强撑着身体去做，内心委屈，怕被抛弃。", "B. 边界模糊。虽然拒绝了，但随后陷入长时间内疚。", "C. 解释冲动。会拒绝但需要罗列一堆理由证明自己情有可原。", "D. 安全依恋。坚定表达“我需要休息”，相信关系能容纳。"] },
    { d: 'Worth', s: 'Rel', t: "假如一个条件极好、近乎完美的对象对你表示好感？", o: ["A. 回避防御。本能想冷处理，觉得我不配。", "B. 焦虑破坏。故意发脾气测试对方到底什么时候会离开。", "C. 防御性悲观。时刻提醒自己别抱太大希望。", "D. 自信接纳。觉得我们就该是同一个世界的人，自信回应。"] },
    { d: 'Scarcity', s: 'Rel', t: "伴侣因为忙碌回复晚了几个小时，你的状态？", o: ["A. 焦虑爆发。脑补出轨，陷入极度恐慌的被抛弃感。", "B. 思维强迫。虽不吵闹但心神不宁，每隔几分钟看手机。", "C. 轻度依赖。理智知道在忙，但情绪上感到失落不满。", "D. 独立自我。安住当下，信任并享受这段独处。"] },
    { d: 'Scarcity', s: 'Rel', t: "聚会上看到伴侣和异性谈笑风生，你的内心？", o: ["A. 占有欲失控。嫉妒中烧，觉得自尊受辱，当场黑脸。", "B. 侦探模式。表面大度，回家开始查手机寻找蛛丝马迹。", "C. 竞争焦虑。拿自己和对方比较，需要伴侣哄确认安全。", "D. 核心自信。毫无波澜，甚至欣赏伴侣的社交魅力。"] },
    { d: 'Scarcity', s: 'Rel', t: "当你单身或想象长期单身，潜意识深处感觉？", o: ["A. 寄生心理。像末日，觉得注定孤独终老，想随便抓个人。", "B. 市场论。好人都被挑光了，我的价值在随年龄暴跌。", "C. 环境压力。看到秀恩爱受刺激，着急一下。", "D. 自足圆满。享受单身，相信最好的伴侣在来的路上。"] },
    { d: 'Control', s: 'Rel', t: "原定的约会计划因对方原因临时大改动？", o: ["A. 秩序偏执。雷霆震怒，情绪彻底崩溃，拒绝新方案。", "B. 隐性惩罚。勉强同意但全程黑脸，一直唠叨让大家不爽。", "C. 情绪惯性。叹口气，需一点时间消化不快，再重规划。", "D. 弹性接纳。认为也许是更好的惊喜，享受当下。"] },
    { d: 'Control', s: 'Rel', t: "面对伴侣身上你看不惯的生活习惯？", o: ["A. 控制狂。讲道理指责，不改就上升到“你不爱我”。", "B. 被动攻击。隐形施压，叹气皱眉营造低气压。", "C. 轻度干涉。提过建议，如果不改心里会嫌弃。", "D. 界限清晰。尊重差异，完全尊重那是他的生活方式。"] },
    { d: 'Control', s: 'Rel', t: "当关系处于暧昧阶段或冷战期？", o: ["A. 无法忍受模糊。抓狂逼问，必须立刻给个说法。", "B. 反刍内耗。过度分析每一句说话，情绪起伏剧烈。", "C. 外部确认。找朋友倾诉，想从别人口中得到确定。", "D. 臣服过程。允许留白，专注于提升自己。"] },
    { d: 'Victim', s: 'Rel', t: "回顾过往一段痛苦的情感经历，结论是？", o: ["A. 受害者认同。“我总遇到渣男，我是无辜受害者”。", "B. 道德绑架。“我付出全部却被辜负”，沉浸在委屈中。", "C. 责任推诿。觉得双方都有错但潜意识觉得对方错大。", "D. 完全责任。“这段关系我也参与了”，感谢对方教我功课。"] },
    { d: 'Victim', s: 'Rel', t: "激烈的争吵中，你最容易脱口而出？", o: ["A. 指责型。“都是因为你...所以我才...”。", "B. 标签化。“你怎么总这样？你这人就是自私”。", "C. 情绪化。表达了很受伤，但语调带指责。 ", "D. 一致性。“当发生某事时我感到...因为我希望...”。"] },
    { d: 'Victim', s: 'Rel', t: "伴侣忘记纪念日或没满足你的隐性期待？", o: ["A. 退行。觉得没人疼没人爱，像被遗弃的孩子。", "B. 操控。开启冷暴力模式，心里等对方来猜。 ", "C. 直接表达。感到失望，直接告诉他我不高兴了。 ", "D. 情感独立。“他给是锦上添花，不给我也能开心”。"] },
    { d: 'Limits', s: 'Rel', t: "看到完美的爱情故事，你的直觉反应？", o: ["A. 犬儒主义。彻底否认，“都是骗小孩的童话”。", "B. 低配得感。自我降级，“别人有但我没那个命”。", "C. 稀缺心态。羡慕但觉得概率极低，像中彩票。 ", "D. 相信美好。确信真爱存在，我也值得拥有。"] },
    { d: 'Limits', s: 'Rel', t: "对于“灵魂伴侣”这种深度共鸣，态度是？", o: ["A. 回避深度。觉得是扯淡，过日子就是柴米油盐。", "B. 恐惧依恋。既渴望又极怕，怕遇到了万一失去会死。", "C. 外求。相信存在但觉得运气不好还没遇到。 ", "D. 开放心态。随时链接，相信并敞开。"] },
    { d: 'Limits', s: 'Rel', t: "想象伴侣突然事业飞升、变得越来越耀眼？", o: ["A. 共生绞杀。恐慌被甩，甚至想拖他后腿。 ", "B. 竞争心态。觉得如果不拼命追赶就会被放下。", "C. 混合情绪。喜忧参半，为他高兴但也担心差距。 ", "D. 共同成长。自豪喜悦，深知他是我的镜像。"] },

/** =========================
 *  1) 变量与逻辑初始化
 * ========================= */
const DIMENSIONS = ["Worth","Scarcity","Control","Victim","Limits"];
let state = { activated: false, idx: 0, answers: Array(questions.length).fill(null) };

const leftCard = document.getElementById("leftCard");
const rightCard = document.getElementById("rightCard");
const codeInput = document.getElementById("codeInput");
const btnActivate = document.getElementById("btnActivate");
const activateMsg = document.getElementById("activateMsg");
const pillProgress = document.getElementById("pillProgress");

/** =========================
 *  2) 核心：激活
 * ========================= */
btnActivate.addEventListener("click", async () => {
    const code = codeInput.value.trim();
    if(!code) return alert("请输入激活码");
    
    btnActivate.disabled = true;
    btnActivate.textContent = "正在验证...";
    
    try {
        const res = await fetch("/api/redeem", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ code })
        });
        const data = await res.json();
        if(data.ok) {
            state.activated = true;
            rightCard.style.display = "none";
            renderQuiz();
        } else {
            activateMsg.innerHTML = `<div class="error">${data.msg}</div>`;
        }
    } catch (e) {
        activateMsg.innerHTML = `<div class="error">网络请求失败，请检查 Vercel 环境变量设置。</div>`;
    } finally {
        btnActivate.disabled = false;
        btnActivate.textContent = "激活并开始";
    }
});

/** =========================
 *  3) 核心：渲染题目
 * ========================= */
function renderQuiz() {
    const q = questions[state.idx];
    const done = state.answers.filter(x => x !== null).length;
    const pct = Math.round((done / questions.length) * 100);
    pillProgress.textContent = `${done}/${questions.length}`;

    leftCard.innerHTML = `
        <div style="margin-bottom:10px;">
           <span class="tag"><b>领域</b> ${q.s}</span>
           <span class="tag"><b>维度</b> ${q.d}</span>
        </div>
        <h2 style="margin-top:0; font-size:20px; line-height:1.4;">${q.t}</h2>
        <div class="progress"><div class="bar" style="width:${pct}%"></div></div>
        <div class="options">
            ${q.o.map((text, i) => `
                <div class="opt ${state.answers[state.idx] === i ? 'selected' : ''}" onclick="pick(${i})">
                    ${text}
                </div>
            `).join("")}
        </div>
        <div style="margin-top:24px; display:flex; justify-content:space-between;">
            <button onclick="prev()" ${state.idx === 0 ? 'disabled' : ''}>← 上一题</button>
            ${done === questions.length ? '<button class="primary" onclick="renderResult()">查看报告 →</button>' : ''}
        </div>
    `;
}

window.pick = (i) => {
    state.answers[state.idx] = i;
    if(state.idx < questions.length - 1) {
        state.idx++;
        renderQuiz();
    } else {
        renderQuiz();
    }
};

window.prev = () => { if(state.idx > 0) { state.idx--; renderQuiz(); } };

/** =========================
 *  4) 核心：计算并渲染结果
 * ========================= */
function renderResult() {
    const dimSum = {Worth:0, Scarcity:0, Control:0, Victim:0, Limits:0};
    const sphereSum = {Money:0, Rel:0, Career:0, Body:0};
    
    state.answers.forEach((ans, i) => {
        const q = questions[i];
        dimSum[q.d] += ans; // 0,1,2,3
        sphereSum[q.s] += ans;
    });

    // 渲染维度分析
    const dimHtml = DIMENSIONS.map(d => {
        const score = dimSum[d];
        const pct = Math.round((score / 36) * 100);
        let level = "卡点";
        if(pct >= 80) level = "通透";
        else if(pct >= 60) level = "稳定";
        else if(pct >= 40) level = "敏感";

        return `
            <div class="metric">
                <div style="display:flex; justify-content:space-between; font-size:14px; font-weight:bold;">
                    <span>${d}</span>
                    <span>${pct}% (${level})</span>
                </div>
                <div class="meter">
                    <div style="width:${pct}%; height:100%; background:linear-gradient(90deg, #ef4444, #22c55e);"></div>
                </div>
                <div style="font-size:11px; color:var(--muted); margin-top:6px;">原始得分：${score} / 36</div>
            </div>
        `;
    }).join("");

    leftCard.innerHTML = `
        <h2 style="margin-top:0;">测评报告</h2>
        <p style="color:var(--muted); font-size:14px;">分数代表在该维度的“通透度”，分越高越顺滑，分越低说明此处旧脚本越深。</p>
        <div class="resultgrid">${dimHtml}</div>
        <div class="hr"></div>
        <div class="notice">建议：根据得分最低的维度，重点关注相关的潜意识练习。</div>
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button class="primary" onclick="copyRes()">复制得分给老师</button>
            <button onclick="location.reload()">重新测评</button>
        </div>
    `;
}

window.copyRes = () => {
    const dimSum = {Worth:0, Scarcity:0, Control:0, Victim:0, Limits:0};
    state.answers.forEach((ans, i) => dimSum[questions[i].d] += ans);
    const txt = `能量脚本得分分析：\nWorth: ${dimSum.Worth}\nScarcity: ${dimSum.Scarcity}\nControl: ${dimSum.Control}\nVictim: ${dimSum.Victim}\nLimits: ${dimSum.Limits}\n(满分为36，分越高越通透)`;
    navigator.clipboard.writeText(txt).then(() => alert("结果已复制，请发送给您的指导老师。"));
};

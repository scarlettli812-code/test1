<!doctype html> <html lang="zh-CN"> <head>   <meta charset="utf-8" />   <meta name="viewport" content="width=device-width,initial-scale=1" />   <title>能量脚本测评（激活码版）</title>   <style>     :root{       --bg:#0b0f17; --card:#111827; --card2:#0f172a; --text:#e5e7eb; --muted:#9ca3af;       --accent:#8b5cf6; --accent2:#22c55e; --danger:#ef4444; --border:#1f2937;       --shadow: 0 10px 30px rgba(0,0,0,.35);       --radius: 18px;       --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;       --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";     }     *{box-sizing:border-box}     body{margin:0; background: radial-gradient(1200px 800px at 20% 10%, rgba(139,92,246,.28), transparent 60%), var(--bg); color:var(--text); font-family:var(--sans); line-height:1.5;}     .wrap{max-width:980px; margin:0 auto; padding:22px;}     .topbar{display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:18px;}     .brand{display:flex; align-items:center; gap:10px;}     .logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg, #8b5cf6, #22c55e); box-shadow:var(--shadow);}     .title{font-size:18px; font-weight:700}     .pill{border:1px solid var(--border); background:rgba(17,24,39,.6); padding:8px 10px; border-radius:999px; font-size:12px; color:var(--muted);}     .grid{display:grid; grid-template-columns: 1.2fr .8fr; gap:16px;}     @media (max-width: 900px){ .grid{grid-template-columns: 1fr} }     .card{background:linear-gradient(180deg, rgba(17,24,39,.92), rgba(15,23,42,.92)); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:24px;}     .hr{height:1px;background:var(--border); margin:14px 0}     button{appearance:none; border:1px solid var(--border); background:rgba(17,24,39,.6); color:var(--text); padding:10px 14px; border-radius:14px; cursor:pointer; font-weight:650;}     button.primary{background:linear-gradient(135deg, rgba(139,92,246,.95), rgba(34,197,94,.85)); border-color:transparent; color:white;}     button:disabled{opacity:.5; cursor:not-allowed;}     .input{ width:100%; border:1px solid var(--border); background:rgba(15,23,42,0.6); color:var(--text); padding:12px; border-radius:14px; outline:none; margin-bottom:10px;}     .tag{display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:999px; border:1px solid var(--border); background:rgba(17,24,39,0.55); font-size:12px; color:var(--muted);}     .tag b{color:var(--text)}     .progress{height:10px; background:rgba(31,41,55,.8); border:1px solid var(--border); border-radius:999px; overflow:hidden; margin:10px 0;}     .bar{height:100%; width:0%; background:linear-gradient(90deg, #8b5cf6, #22c55e); transition: width .3s;}     .options{display:flex; flex-direction:column; gap:10px; margin-top:20px;}     .opt{ text-align:left; padding:16px; border-radius:16px; border:1px solid var(--border); background:rgba(17,24,39,.55); cursor:pointer; transition: all 0.2s; font-size:15px; }     .opt:hover{ border-color: #8b5cf6; background: rgba(139,92,246,0.1); }     .opt.selected{ border-color: #22c55e; background: rgba(34,197,94,0.15); }     .resultgrid{display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:20px;}     @media (max-width: 720px){ .resultgrid{grid-template-columns:1fr} }     .metric{border:1px solid var(--border); background:rgba(15,23,42,.55); border-radius:16px; padding:16px;}     .meter{height:10px; border-radius:999px; background:rgba(31,41,55,.85); overflow:hidden;}     .notice{padding:12px; border-radius:14px; border:1px solid rgba(139,92,246,.35); background:rgba(139,92,246,.12); color:var(--text); font-size:13px;}     .error{padding:10px; border-radius:10px; border:1px solid rgba(239,68,68,.35); background:rgba(239,68,68,0.12); color:#fca5a5; font-size:13px; margin-top:10px;}     .footer{margin-top:24px; color:var(--muted); font-size:12px; text-align:center;}   </style> </head> <body> <div class="wrap">   <div class="topbar">     <div class="brand"><div class="logo"></div><div><div class="title">能量脚本测评</div><div class="subtitle">深度意识觉察载具</div></div></div>     <div class="pill">进度：<strong id="pillProgress">0/60</strong></div>   </div>    <div class="grid">     <div class="card" id="leftCard">       <h2>激活测评</h2>       <p style="color:var(--muted)">本套能量脚本包含 60 道深度测试题，涵盖金钱、关系、事业、身体四大领域。请输入激活码解锁全文。</p>     </div>      <div class="card" id="rightCard">       <label style="font-size:12px; color:var(--muted)">激活码</label>       <input id="codeInput" class="input" placeholder="请输入您的激活码" />       <button class="primary" style="width:100%" id="btnActivate">激活并开始</button>       <div id="activateMsg"></div>       <div class="hr"></div>       <div style="font-size:12px; color:var(--muted)">         注意：<br/>         1. 激活码仅供单人单次激活。<br/>         2. 建议在静心状态下完成。       </div>     </div>   </div> </div>  <script> /** =========================  *  0) 完整 60 题库（按你要求保持原样）  * ========================= */ const questions = [     { d: 'Worth', s: 'Money', t: "当你几乎没有付出什么“辛苦努力”，却意外获得了一笔丰厚的奖金或馈赠，钱到账的那一瞬间，你的真实体感是？", o: ["A. 极度不安。感觉这钱“烫手”，甚至心慌意乱，觉得“天降横财必有横祸”，必须立刻花掉或转手送人才能心安。", "B. 怀疑与恐慌。“是不是搞错了？我不值这么多”，把钱存起来完全不敢动用，生怕之后会被追回。", "C. 略带压力。虽然收下了，但心里暗暗发誓“下次肯定没这种好事了”，或者觉得自己必须加倍努力工作来“配得上”这笔钱。", "D. 平静的惊喜。就像收到当月工资一样自然，开心地收下并规划用途，内心觉得“我有好运是很正常的事”."] },     { d: 'Worth', s: 'Money', t: "当你终于下定决心买下那件昂贵但非必需的“梦中情物”（如名牌包、手表）后，把东西拿回家的那一小时内状态是？", o: ["A. 强烈的罪恶感。内心有个声音不断攻击自己“太败家、太虚荣”，甚至想立刻退货，心情比买之前更糟糕。", "B. 补偿心理。看着东西虽然喜欢，但立刻给自己制定“惩罚计划”——比如接下来的一个月必须吃土，通过“受苦”来赎罪。", "C. 需要理由。需要反复强调它的“实用性”和“保值率”，试图用逻辑说服大脑“这笔钱花得有道理”，不敢承认仅仅是因为喜欢。", "D. 纯粹的喜悦。欣赏它的质感，使用它时感到快乐和满足，完全没有关于价格的心理负担，也不会去想“回本”的事。"] },     { d: 'Worth', s: 'Money', t: "当客户或老板主动提出给你“高于预期”的报酬，且并没有附加额外的工作要求时？", o: ["A. 下意识拒绝。“不不不，太多了，我不值这个价”，身体本能地想把机会往外推，收了反而会焦虑得睡不着。", "B. 恐慌性补偿。勉强收下，但内心极度恐慌，于是拼命主动加班、赠送额外服务，必须让自己付出的辛苦程度“超过”这笔钱才安心。", "C. 窃喜带疑。开心是开心，但心里会嘀咕“他们是不是不知道我其实没那么厉害”，担心以后露馅。", "D. 大方致谢。平静地确认“是的，我的专业能力和服务值得这个价格”，不卑不亢地收下。"] },     { d: 'Scarcity', s: 'Money', t: "每月不得不支付房租、房贷或大额固定账单的那一瞬间，哪怕余额足够，你的身体感受是？", o: ["A. 躯体紧缩。胃部痉挛、胸口发闷，感觉这一笔钱付出去就像是在“割肉”或“放血”，瞬间产生一种“我要活不下去了”的濒死感。", "B. 怨气冲天。一边付款一边在心里咒骂“怎么这么贵”，通过愤怒来掩盖内心的无力感，付完款心情极差。", "C. 情感隔离。没什么痛感，但完全屏蔽了感觉，像机器一样快速划走，不敢去细想账户余额变少的事实。", "D. 轻松流动。内心舒展，感谢这笔钱换来了舒适居住空间，觉得这是一种愉快价值交换。"] },     { d: 'Scarcity', s: 'Money', t: "刷朋友圈看到同龄人晒豪车、奢华旅行或巨额收益截图时，你脑海中冒出的第一个念头？", o: ["A. 恶意揣测。“肯定是不义之财/被包养/P图骗人的”，必须通过把对方“妖魔化”来维持内心的平衡。", "B. 瞬间萎缩。觉得自己是个废物，感叹“世界不公平”，焦虑感瞬间爆棚。", "C. 心理隔离。“挺好的，但这种生活离我很远”，潜意识里不相信自己能拥有。", "D. 欣赏与好奇。会好奇对方是怎么做到的，并将其视为一种可能性的参照。"] },     { d: 'Scarcity', s: 'Money', t: "面对“满1000减200”或“买一送一”的大促活动，你通常会如何行动？", o: ["A. 恐慌性囤积。完全被“不买就是亏”的焦虑驱动，囤了一堆根本用不完的东西。", "B. 贪便宜心理。为了那个折扣，硬是凑单买了几件其实不太喜欢的商品，买完回家觉得后悔。", "C. 轻微动摇。会被诱惑多看几眼，稍微多买一点日用品。", "D. 核心聚焦。只买自己原本计划需要的高品质商品，完全不被折扣标签绑架。"] },     { d: 'Control', s: 'Money', t: "对于你的存款余额或理财账户，你查看的频率和当下的心情是？", o: ["A. 强迫性查看。每天都要看好几次，数字稍微下跌一点都会让我极度恐慌。", "B. 依赖性查看。每天睡前或醒来必须看一眼，确认数字还在才能感到踏实。", "C. 定期复盘。每周或每月看一次，平时虽不看，但环境不好时心里会打鼓。", "D. 信任与放手。长期持有，相信财富有它自己的增长周期。"] },     { d: 'Control', s: 'Money', t: "如果有人向你推荐一个你完全不熟悉、但似乎很有潜力的赚钱新机会（非诈骗），你会？", o: ["A. 僵化防御。“不在我计划内的都是风险”，直接拒绝了解，坚信只有靠自己一步步规划才安全。", "B. 焦虑纠结。想试又不敢试，反复分析利弊直到机会溜走。", "C. 谨慎观望。保持关注，但需要看到身边有人成功了，才敢投入一点点。", "D. 开放评估。如果评估后觉得可行且有趣，会欣然尝试。"] },     { d: 'Control', s: 'Money', t: "在一次旅行或项目中，因为不可抗力导致预算超支了20%，你的第一反应？", o: ["A. 情绪崩溃。暴怒或极度焦虑，觉得“一切都乱套了”，不停指责自己或同伴。", "B. 惩罚性止损。为了弥补缺口，强行砍掉后面所有精彩体验项目，让大家都玩得压抑。", "C. 事后反刍。虽然接受了现实，但心里始终有个疙瘩，时不时会念叨几句。", "D. 弹性调整。“既然发生了就是最好的安排”，相信这笔钱换来了独特的体验。"] },     { d: 'Victim', s: 'Money', t: "哪怕深夜独自一人时，你认为目前阻碍你实现“财富自由”的最大原因是？", o: ["A. 宿命论。“因为我没有富爸爸/没背景/命不好”，认为阶级已经固化。", "B. 环境归因。“现在经济形势太差了/行业不行”，总是觉得外部条件在针对自己。", "C. 责任转移。“要不是为了家庭/孩子/伴侣，我早就飞黄腾达了”。", "D. 内控点。“是我当下的认知和能力还未匹配那个量级的财富”，专注于提升自己。"] },     { d: 'Victim', s: 'Money', t: "假如遭遇了理财亏损或被人借钱不还，你的长期反应是？", o: ["A. 受害上瘾。逢人就诉苦，沉浸在“为什么倒霉的总是我”的悲情中。", "B. 情绪消耗。脑子里全是报复或怨恨的念头，消耗了大量精力去恨对方。", "C. 创伤残留。自认倒霉，但潜意识里留下了“人都会骗我钱”的阴影。", "D. 成长复盘。反思是自己哪个贪念或盲点导致了决策，吸取教训迅速翻篇。"] },     { d: 'Victim', s: 'Money', t: "当你有机会进入一个高净值人群（富人）的社交场合，你的真实心态是？", o: ["A. 被迫害妄想。“他们肯定看不起我/想割我韭菜”，全程保持防御，想逃离。", "B. 自我矮化。“人家都是资源互换，我啥也没有”，躲在角落不敢说话。", "C. 虚假自我。觉得自己低人一等，需要通过伪装或夸大实力才能被接纳。", "D. 自信配对。“既然我在这里，说明我的能量与此匹配”，不卑不亢。"] },     { d: 'Limits', s: 'Money', t: "闭上眼，试着想象你的年收入突然翻了10倍，随之而来的第一个念头是？", o: ["A. 代价恐惧。“那一定会累死/失去健康/家庭破裂”，深信巨富必须用巨大牺牲交换。", "B. 理性扼杀。“这根本不科学/不可能”，大脑立即寻找证据证明这是幻想。", "C. 勤劳陷阱。“那我得打多少份工啊？”，只想着用现有辛苦模式堆叠。", "D. 愿景接纳。感觉到轻松和自由，觉得“这就是我未来的自然状态”。"] },     { d: 'Limits', s: 'Money', t: "在你的潜意识深处，关于“善良/人品”与“有钱”的关系，你更倾向于相信？", o: ["A. 道德审判。“为富不仁，想赚大钱就得心狠手辣”，做好人注定清贫。", "B. 清高防御。“谈钱太俗了”，认为追求财富会玷污灵魂。", "C. 风险预设。钱是中性的，但还是觉得虽然有了钱不一定变坏，但会带来麻烦。", "D. 能量中性。“钱是中性的放大镜”，它会让善良的人更有能力行善。"] },     { d: 'Limits', s: 'Money', t: "面对“轻松赚钱”、“被动收入”这些概念时，你的真实想法？", o: ["A. 苦行僧思维。“这都是投机取巧”，坚信只有流汗赚的钱才是干净的。", "B. 自我设限。“可能有这种事，但我没那个命”，觉得那是天才的特权。", "C. 知行脱节。想要相信，但不知道怎么做，行动上还是习惯苦干。", "D. 杠杆思维。“赚钱可以是充满创造力且愉悦的”，相信只要找对杠杆财富会流向我。"] },      { d: 'Worth', s: 'Rel', t: "当伴侣或异性极其真诚、热烈地赞美你（如夸赞你的魅力或才华）时，你的下意识反应？", o: ["A. 防御抵触。浑身不自在，觉得对方要么是在讽刺我，要么是有所图谋。", "B. 冒充者综合征。尴尬转移视线，心里立刻列举出一堆缺点来反驳。", "C. 接受障碍。礼貌地说谢谢，但心里并没有完全把这份赞美“吃”进去。", "D. 自我确认。全然接收，眼神发光地享受这份能量流动。"] },     { d: 'Worth', s: 'Rel', t: "当你已经非常疲惫，但伴侣提出希望你做家务或满足某种情感/生理需求时？", o: ["A. 讨好牺牲。强撑着身体去做，内心充满委屈，“一旦拒绝就不值得被爱了”。", "B. 边界模糊。虽然拒绝了，但随后陷入长时间内疚，生怕对方生气。", "C. 解释冲动。会拒绝，但需要罗列一堆理由来证明自己，不够理直气壮。", "D. 安全依恋。温和而坚定地表达“我需要休息”，相信关系能容纳彼此真实状态。"] },     { d: 'Worth', s: 'Rel', t: "假如一个各方面条件都极好、甚至近乎完美的潜在对象对你表示强烈好感，你会？", o: ["A. 回避型防御。本能想冷处理，觉得“不属于我/我配不上”。", "B. 焦虑型破坏。患得患失，故意发脾气或提无理要求，想测试对方离开。", "C. 防御性悲观。小心翼翼接触，时刻提醒自己“别抱太大希望”。", "D. 自信接纳。兴奋且坦然，觉得“我们就该是同一个世界的人”。"] },     { d: 'Scarcity', s: 'Rel', t: "当伴侣因为忙碌，回复信息比平时晚了几个小时且未提前告知，你的状态？", o: ["A. 依恋焦虑爆发。疯狂发消息，脑补出轨，陷入极度恐慌的被抛弃感。", "B. 思维强迫。虽不吵闹但心神不宁，每隔几分钟看一次手机。", "C. 轻度依赖。理智知道在忙，但情绪上感到失落，见面忍不住埋怨。", "D. 独立自我。安住当下，完全信任对方，享受独处时光。"] },     { d: 'Scarcity', s: 'Rel', t: "在聚会上，看到伴侣和一位有魅力的异性朋友谈笑风生，你的内心活动？", o: ["A. 占有欲失控。嫉妒之火中烧，觉得尊严受辱，当场黑脸或事后大发雷霆。", "B. 侦探模式。表面假装大度，回家开始查手机寻找“出轨”蛛丝马迹。", "C. 竞争焦虑。稍微有点酸，忍不住拿自己比较，需要被哄。", "D. 核心自信。毫无波澜，甚至欣赏伴侣社交魅力，对关系有绝对安全感。"] },     { d: 'Scarcity', s: 'Rel', t: "当你处于单身状态，或者想象自己长期单身，潜意识深处的感觉是？", o: ["A. 寄生心理。像世界末日，觉得注定孤独终老，想要随便抓人填空虚。", "B. 市场论。觉得“好人都挑光了”，如果不抓紧机会就没机会了。", "C. 环境压力。看到别人秀恩爱会受刺激，着急一下。", "D. 自足圆满。享受单身，相信最好的在路上，宁缺毋滥。"] },     { d: 'Control', s: 'Rel', t: "原定的约会或旅行计划，因为对方原因临时大改动，你会？", o: ["A. 秩序偏执。雷霆震怒，觉得对方不可理喻，情绪彻底崩溃。", "B. 隐性惩罚。勉强同意但全程黑脸，一直唠叨，让大家玩不开心。", "C. 情绪惯性。叹口气，需要一点时间消化不快，然后重新规划。", "D. 弹性接纳。“也许这是更好的惊喜”，迅速调整心态。"] },     { d: 'Control', s: 'Rel', t: "面对伴侣身上你看不惯的生活习惯（如品味、作息），你的做法是？", o: ["A. 控制狂。改造工程，讲道理、指责，不改就上升到“你不爱我”。", "B. 被动攻击。隐形施压，看着不顺眼就叹气皱眉，营造低气压。", "C. 轻度干涉。提过几次建议，如果实在改不了，心里有点嫌弃。", "D. 界限清晰。尊重差异，完全尊重对方的生活方式。"] },     { d: 'Control', s: 'Rel', t: "当关系处于模糊不清的暧昧阶段或冷战期，你的内心状态？", o: ["A. 无法忍受模糊。抓狂逼问，必须立刻给说法，哪怕结果是分手。", "B. 反刍内耗。过度分析，每天像做阅读理解一样分析每一句说话。", "C. 外部确认。找朋友倾诉分析，试图从别人口中得到确定的答案。", "D. 臣服过程。允许留白，安住在当下，让答案自然浮现。"] },     { d: 'Victim', s: 'Rel', t: "当你回顾过往的一段痛苦情感经历，你脑海中最常浮现的结论是？", o: ["A. 受害者认同。“我总是遇到渣男/渣女”，觉得全天下人都对不起我。", "B. 道德绑架。“我付出了全部却被辜负”，沉浸在委屈中。", "C. 责任推诿。觉得双方都有问题，但潜意识觉得对方责任更大。", "D. 完全责任。“这段关系是我共谋创造的”，感谢对方教会我功课。"] },     { d: 'Victim', s: 'Rel', t: "在激烈的争吵中，你最容易脱口而出的句式倾向于？", o: ["A. 指责型。“都是因为你...所以我才...”，认为情绪是对方造成的。", "B. 标签化。“你怎么总是这样？你就是自私”，攻击对方人格。", "C. 情绪化。表达了情绪但语调中带有指责和索取的意味。", "D. 一致性。“当发生...事时我感到...”，谈论感受而非攻击。"] },     { d: 'Victim', s: 'Rel', t: "当伴侣忘记了纪念日或没有满足你的隐性期待（如送礼）时？", o: ["A. 退行。弃婴心态，哭闹或绝望，觉得自己没人疼没人爱。", "B. 操控。开启冷暴力模式，心里想“他要是爱我就应该懂我”。", "C. 直接表达。感到失望，会直接告诉他我不高兴了。", "D. 情感独立。自我负责，“他给是锦上添花，不给我也能让自己开心”。"] },     { d: 'Limits', s: 'Rel', t: "看到电影或书里那种深刻默契的完美爱情故事，你的直觉反应？", o: ["A. 犬儒主义。彻底否认，“都是骗小孩的童话”，嗤之以鼻。", "B. 低配得感。自我降级，“也许别人有，但我没那个命”。", "C. 稀缺心态。羡慕但觉得概率极低，不敢奢望。", "D. 相信美好。确信并相信“这也是我能拥有的实相”。"] },     { d: 'Limits', s: 'Rel', t: "对于“灵魂伴侣”或“深度精神共鸣”的关系，你的真实态度？", o: ["A. 回避深度。嘲讽抗拒，觉得是矫情扯淡，过日子就是柴米油盐。", "B. 恐惧依恋。既渴望又极怕，觉得“如果真的遇到了万一失去我会死”。", "C. 外求。相信存在但觉得“还没遇到对的人”，归咎于运气。", "D. 开放心态。随时链接，坚信并敞开，相信自然发生。"] },     { d: 'Limits', s: 'Rel', t: "想象你的伴侣突然事业飞升、变得越来越优秀和耀眼，你会？", o: ["A. 共生绞杀。恐慌发作，觉得他肯定会甩了我，潜意识想拖后腿。", "B. 竞争心态。压力很大，觉得如果不拼命追赶就会被放下。", "C. 混合情绪。喜忧参半，为他高兴但也担心两人的差距拉大。", "D. 共同成长。自豪喜悦，深知“他是我的镜像”，他好说明我也优秀。"] },      { d: 'Worth', s: 'Career', t: "当你在公开场合被领导隆重表扬，并授予你梦寐以求的荣誉时？", o: ["A. 冒名顶替。极度恐慌，担心很快露馅，“捧得越高摔得越惨”。", "B. 回避焦点。拼命推卸，强调“都是团队功劳”或“运气好”。", "C. 预期焦虑。压力倍增，立刻担心“下次做不到这么好怎么办”。", "D. 自我确认。荣耀接纳，内心平静自豪，确信是对努力的公平回馈。"] },     { d: 'Worth', s: 'Career', t: "面对一个极具挑战性、同时也伴随巨大收益的晋升机会？", o: ["A. 退缩回避。自我劝退，“我不行”，脑子里全搞砸后的惨状。", "B. 自我设障。纠结内耗，报名了但潜意识里故意表现不好。", "C. 评价焦虑。预演失败，会争取但脑子里全是失败后的别人看法。", "D. 胜任感。舍我其谁，专注于思考如何拿下它并做好它。"] },     { d: 'Worth', s: 'Career', t: "当你接手一个重要新项目还没开始，脑海中常浮现“我做不到”的声音？", o: ["A. 功能性冻结。这种声音震耳欲聋，导致经常拖延到最后一刻。", "B. 内耗严重。需要花很大力气、做心理建设去压制声音才能开始。", "C. 轻微杂音。偶尔干扰，特别在疲惫时，但我能理性调整。", "D. 效能感。积极内言，我的内言多是“这事有意思”。"] },      { d: 'Scarcity', s: 'Career', t: "得知你的竞争对手或同期同事取得了巨大成功（如公司上市）时？", o: ["A. 嫉妒攻击。极端痛苦，觉得机会抢光了，甚至暗暗希望对方倒霉。", "B. 恐慌跟进。感到恐慌，开始盲目模仿对方，彻底打乱节奏。", "C. 竞争焦虑。感到压力，以此鞭策自己但也伴随着疲惫感。", "D. 做大蛋糕。真诚祝贺，认为这证明了市场繁荣，路走得通。"] },     { d: 'Scarcity', s: 'Career', t: "在团队中需要分享核心资源或独家经验时，你的真实态度？", o: ["A. 囤积信息。严防死守，绝对保密，怕教会徒弟饿死师父。", "B. 防御性保留。留有一手，必须确保自己具有不可替代性。", "C. 交易心态。愿意分享，但如果对方没足够感激，心里很不平。", "D. 成长心态。乐于分享，相信给予能建立影响力。"] },     { d: 'Scarcity', s: 'Career', t: "当行业出现动荡或公司流传裁员传闻时？", o: ["A. 灾难化。惊恐发作，觉得一旦失业人生就完了，卑微保命。", "B. 稀缺心态。开始疯狂海投，无论喜不喜欢只要给饭碗就行。", "C. 风险厌恶。防御姿态，密切关注，心情略显沉重。", "D. 反脆弱。保持精进，相信核心竞争力，危机往往伴随洗牌。"] },      { d: 'Control', s: 'Career', t: "当你把一项重要任务交给下属或合作伙伴后，你的行为模式是？", o: ["A. 强迫控制。夺权干涉，看到瑕疵就忍不住拿回来重做。", "B. 信任缺失。表面不催，但心里根本不信任，神经紧绷。", "C. 适度控制。设立关键检查点，中间不过问，但等待时有焦虑。", "D. 充分授权。用人不疑，允许犯错成长。"] },     { d: 'Control', s: 'Career', t: "面对项目结果不如预期（如业绩未达标）时？", o: ["A. 完美主义崩溃。全盘否定，陷入自我攻击或指责他人。", "B. 拒绝接纳。过度补救，通宵加班想强行扳回，极度焦虑状态。", "C. 情绪波动。复盘分析原因，情绪略低落但能接受现实。", "D. 科学家思维。数据反馈，接纳结果，调整方向即可。"] },     { d: 'Control', s: 'Career', t: "你是否经常觉得“如果我不操心不盯着，这件事肯定会搞砸”？", o: ["A. 全能自恋。救世主情结，觉得离了我这儿就转不动了。", "B. 控制型疲劳。大部分时候是，觉得只有亲力亲为才最安全。", "C. 情境性控制。在关键节点上会有这种想法，平时还好。", "D. 边界清晰。不觉得，我相信每个人都能为自己结果负责。"] },      { d: 'Victim', s: 'Career', t: "当你在工作中长期遭遇不公平待遇或复杂人际内耗时？", o: ["A. 有毒受害。觉得全世界都在针对我，不仅赖着不走还要每天吐槽。", "B. 习得性无助。忍气吞声，上班像上坟，觉得自己完全没选择权。", "C. 消极适应。偶尔抱怨，但也知道哪里都有这种事，凑合干。", "D. 行动者。破局者，跳出受害者视角，要么改变它要么离开。"] },     { d: 'Victim', s: 'Career', t: "夜深人静时，你对自己“未能实现理想事业”的归因？", o: ["A. 历史归因。“因为当初父母没支持我/眼界太窄”。", "B. 情境归因。“我有孩子/家庭牵绊，没办法”，拿客观条件当挡箭牌。", "C. 混合归因。“我当时没那个资源和人脉”，承认责任但怪条件。", "D. 未来导向。拿回主导权，从当下开始创造。"] },     { d: 'Victim', s: 'Career', t: "面对上级严厉的负面反馈或工作批评时？", o: ["A. 自我防御。觉得是在侮辱我，反应激烈，听不进内容。", "B. 情绪淹没。委屈自怜，回家大哭一场，心想“为何没人懂我”。", "C. 隐性抗拒。表面接受，心里不服气，觉得老板太变态。", "D. 成长型思维。就事论事，把批评视为提升的养料。"] },      { d: 'Limits', s: 'Career', t: "当你灵光一闪，有了一个绝妙的商业点子时，接下来的动作？", o: ["A. 自我否定。瞬间列出一万个“不行”理由，直接把想法掐死。", "B. 风险放大。想了很多天，最后觉得风险大还是安稳上班。", "C. 验证偏见。做了点但遇到第一个困难就觉得“果然不行”。", "D. 行动导向。立即行动（哪怕只是写个计划），相信资源随愿力而来。"] },     { d: 'Limits', s: 'Career', t: "在你的潜意识脚本里，“巨大的事业成功”通常与以下哪个画面挂钩？", o: ["A. 负面联想。成功=孤独/家庭破裂/过劳死，潜意识抗拒。", "B. 道德洁癖。成功=剥削他人/勾心斗角，觉得道德有瑕疵。", "C. 苦难崇拜。成功需吃尽苦头、扒层皮，怕吃苦所以不敢想。", "D. 正向联想。自我实现，成功是天赋表达，轻盈且利他。"] },     { d: 'Limits', s: 'Career', t: "如果让你诚实评估自己职业生涯的“天花板”？", o: ["A. 身份固化。“我就适合做个小职员，大梁我挑不起来”。", "B. 能力设限。“CEO我做不来，我没那个气场”。", "C. 线性思维。按部就班升是有可能的，不敢想跨越式发展。", "D. 成长思维。天空才是极限，只要我想我可以创造任何成就。"] },      { d: 'Worth', s: 'Body', t: "本该放松的周末午后你什么也没做，醒来后的感觉？", o: ["A. 存在焦虑。极度羞耻，觉得浪费了时间，立刻找事做来弥补。", "B. 做为焦虑。隐隐不安，脑子一直在盘算待会儿得把进度赶回来。", "C. 工具化身体。需要给休息找个功利性的借口才心安。", "D. 存在即价值。休息就是生命一部分，享受无所事事的甜美。"] },     { d: 'Worth', s: 'Body', t: "洗完澡后，当你赤裸地面对全身镜审视身体时？", o: ["A. 身体羞辱。自我厌恶，满眼都是缺陷，心情瞬间变差。", "B. 由于不满。挑剔评判，像考官在给身体扣分，很难满意。", "C. 中立忽视。勉强接受，虽然不讨厌但也没欣赏感。", "D. 身体接纳。爱与感恩，欣赏线条，发自内心觉得美。"] },     { d: 'Worth', s: 'Body', t: "面对价格不菲但能缓解疲劳的身体疗愈（如SPA/体检）时？", o: ["A. 自我剥削。绝不考虑，觉得把钱花在享受上是浪费。", "B. 愧疚消费。实在扛不住才去，但全程都在心疼钱。", "C. 条件性允许。生日或特别累时去一次，平时舍不得。", "D. 长期主义。投资保养，认为载具值得最好对待。"] },     { d: 'Scarcity', s: 'Body', t: "当你发现第一道明显的皱纹或第一根白发时？", o: ["A. 容貌焦虑。像看到死亡倒计时，立刻想买各种抗衰。", "B. 衰退心态。悲观叹息，“老了没人要了”，感到丧失感。", "C. 正常关注。轻微在意，会关注保养但不会上升到价值层面。", "D. 全龄自信。岁月加冕，平静接纳，认为这是阅历纹路。"] },     { d: 'Scarcity', s: 'Body', t: "面对高强度的工作节奏，你对能量储备的底色感觉是？", o: ["A. 电池理论。枯竭恐慌，时刻担心猝死或崩溃。", "B. 透支感。觉得每天在硬撑，必须靠咖啡续命。", "C. 能量节流。小心翼翼分配精力，不敢接额外的活。", "D. 管道理论。只要睡一觉就能满血复活，对身体有信心。"] },     { d: 'Scarcity', s: 'Body', t: "当身体突然出现一些不明原因的小疼痛时，你的第一反应？", o: ["A. 疑病焦虑。灾难联想，越搜越像绝症，陷入极度恐慌。", "B. 躯体关注。过度敏感，疑神疑鬼，心情变得很差。", "C. 逃避就医。心里有点虚但不敢去医院，选择无视。", "D. 身心对话。停下感受身体想告诉我什么，理性就医。"] },     { d: 'Control', s: 'Body', t: "当你没忍住吃了一顿高热量大餐后，心理活动？", o: ["A. 暴政惩罚。极度后悔骂自己猪，立刻决定绝食或疯狂运动。", "B. 数据强迫。焦虑计算卡路里，觉得这顿饭毁了减肥计划。", "C. 轻度代偿。想着明天吃清淡点就行，虽然愧疚但能翻篇。", "D. 直觉饮食。享受满足，相信身体会自动代谢平衡。"] },     { d: 'Control', s: 'Body', t: "当你感冒发烧，但手头还有未完成的工作时？", o: ["A. 对抗身体。强行镇压拒绝承认虚弱，吃双倍药压下去。", "B. 不敢示弱。带病坚持效率极低，不敢请假怕耽误事。", "C. 身在心不在。会请假但躺着还在回消息。", "D. 顺应节律。安心养病，相信地球离了我也转。"] },     { d: 'Control', s: 'Body', t: "关于运动健身，你内心深处最真实的驱动力是？", o: ["A. 外驱恐惧。身材焦虑，我不练就会变丑变胖。", "B. 超我强迫。像打卡上班，为了完成健康人设而练。", "C. 理性驱动。为了体检数据好看点，理智知道该动动。", "D. 内驱享受。喜欢流汗和伸展感觉，享受活力。"] },     { d: 'Victim', s: 'Body', t: "面对自己的体型困扰或慢性健康问题？", o: ["A. 无助感。基因宿命，“我天生体质差”，认为努力无用。", "B. 外部借口。都是外卖太油、压力太大逼得我不健康。", "C. 自我放弃。承认习惯不好但觉得改不了。", "D. 拿回力量。承认是自己选择造成，相信有力量重塑。"] },     { d: 'Victim', s: 'Body', t: "当你处于生理期疼痛或生病脆弱时，你对他人的期待？", o: ["A. 次级获益。觉得我都这样了你还不顺着我，当做筹码。", "B. 被动等待。没人问津会觉得自己是世界上最可怜的人。", "C. 合理需求。希望得到一些照顾，但没空也能理解。", "D. 独立自爱。自己照顾好自己，不因为虚弱而依赖。"] },     { d: 'Victim', s: 'Body', t: "回顾过去失败的健康计划（如减肥）？", o: ["A. 受害者视角。要不是聚会加班我肯定成了，总觉得有人破坏。", "B. 内在攻击。觉得我是个废物，干啥啥不行，陷入自怨。", "C. 归因于术。觉得还没找到最适合方法，还在尝试中。", "D. 觉察视角。觉察到是压力进食等需求没被满足，调整出发。"] },     { d: 'Limits', s: 'Body', t: "闭上眼睛想象自己 70 岁时的画面？", o: ["A. 灾难预期。衰败图景，孤独痴呆，成为子女负担。", "B. 无价值感。隐形透明的老人，生活无聊乏味，混吃等死。", "C. 低期待。平淡养生也就是遛遛弯，只要不生大病。", "D. 积极老龄化。精神矍铄依然在学习创作，优雅有力量。"] },     { d: 'Limits', s: 'Body', t: "你如何看待“情绪”与“身体疾病”的关系？", o: ["A. 身心割裂。身体是机械器官坏了吃药，不信情绪影响。", "B. 大脑独裁。大脑是老大身体必须服从，比如必须熬夜。", "C. 轻度认知。将信将疑，但不怎么关注内心。", "D. 身心合一。深信身体有高智慧，它是潜意识显示器。"] },     { d: 'Limits', s: 'Body', t: "假如被诊断出需要长期调理的健康状况？", o: ["A. 疾病认同。把疾病变成身份认同，觉得这辈子就这样了。", "B. 放弃主权。只有最好的医生能救我，自己不改变。", "C. 无奈接受。觉得好不了了，只能控制症状学会忍受。", "D. 自愈信念。相信这是身体在提醒我改变。"] } ];  /** =========================  *  1) 变量与评分映射  * ========================= */ const DIMENSIONS = ["Worth","Scarcity","Control","Victim","Limits"]; const SCORE_MAP = { A: 0, B: 1, C: 2, D: 3 };  let state = {   activated: false,   idx: 0,   answers: Array(questions.length).fill(null) };  /** =========================  *  2) UI 操作引用  * ========================= */ const leftCard = document.getElementById("leftCard"); const rightCard = document.getElementById("rightCard"); const codeInput = document.getElementById("codeInput"); const btnActivate = document.getElementById("btnActivate"); const activateMsg = document.getElementById("activateMsg"); const pillProgress = document.getElementById("pillProgress");  /** =========================  *  3) 核心逻辑：激活  * ========================= */ btnActivate.addEventListener("click", async () => {   const code = codeInput.value.trim();   if(!code) return;   btnActivate.disabled = true;   btnActivate.textContent = "正在验证...";    try {     const res = await fetch("/api/redeem", {       method: "POST",       headers: { "Content-Type": "application/json" },       body: JSON.stringify({ code })     });     const data = await res.json();     if(data.ok) {       state.activated = true;       rightCard.style.display = "none";       renderQuiz();     } else {       activateMsg.innerHTML = `<div class="error">${data.msg}</div>`;     }   } catch (e) {     activateMsg.innerHTML = `<div class="error">网络错误，无法连接验证服务器。</div>`;   } finally {     btnActivate.disabled = false;     btnActivate.textContent = "激活并开始";   } });  /** =========================  *  4) 核心逻辑：题目渲染  * ========================= */ function renderQuiz() {   const q = questions[state.idx];   const done = state.answers.filter(x => x !== null).length;   const pct = Math.round((done / questions.length) * 100);   pillProgress.textContent = `${done}/${questions.length}`;    leftCard.innerHTML = `     <div class="tag"><b>领域</b> ${q.s}</div>     <div class="tag"><b>维度</b> ${q.d}</div>     <h2 style="margin-top:15px; font-size:20px;">${q.t}</h2>     <div class="progress"><div class="bar" style="width:${pct}%"></div></div>     <div class="options">       ${q.o.map((text, i) => `         <div class="opt ${state.answers[state.idx] === i ? 'selected' : ''}" onclick="pick(${i})">${text}</div>       `).join("")}     </div>     <div style="margin-top:30px; display:flex; justify-content:space-between;">       <button onclick="prev()" ${state.idx === 0 ? 'disabled' : ''}>← 上一题</button>       ${done === questions.length ? '<button class="primary" onclick="renderResult()">查看报告 →</button>' : ''}     </div>   `; }  window.pick = (i) => {   state.answers[state.idx] = i;   if(state.idx < questions.length - 1) {     state.idx++;     renderQuiz();   } else {     renderQuiz();   } };  window.prev = () => { if(state.idx > 0) { state.idx--; renderQuiz(); } };  /** =========================  *  5) 核心逻辑：分数计算（原版逻辑）  * ========================= */ function renderResult() {   const dimSum = {Worth:0, Scarcity:0, Control:0, Victim:0, Limits:0};   const dimCnt = {Worth:0, Scarcity:0, Control:0, Victim:0, Limits:0};   const sphereSum = {};   const sphereCnt = {};    state.answers.forEach((ans, i) => {     const q = questions[i];     dimSum[q.d] += ans; // 0,1,2,3     dimCnt[q.d] += 1;     sphereSum[q.s] = (sphereSum[q.s] || 0) + ans;     sphereCnt[q.s] = (sphereCnt[q.s] || 0) + 1;   });    // 维度分数百分比   const dimScores = {};   DIMENSIONS.forEach(d => {     const max = dimCnt[d] * 3;     dimScores[d] = Math.round((dimSum[d] / max) * 100);   });    const interpret = (s) => {     if(s >= 80) return { l:"通透", n:"你对这一维度的能量流动顺畅。" };     if(s >= 60) return { l:"稳定", n:"大体稳定，但在特定情境仍有旧脚本。" };     if(s >= 40) return { l:"敏感", n:"容易被触发，需要觉察松动。" };     return { l:"卡点", n:"脚本较强，常以对抗/受害保护自己。" };   };    const dimHtml = DIMENSIONS.map(d => {     const s = dimScores[d];     const info = interpret(s);     return `       <div class="metric">         <div style="display:flex; justify-content:space-between; font-size:14px;">           <b>${d}</b> <span>${s}% (${info.l})</span>         </div>         <div class="meter"><div style="width:${s}%; height:100%; background:linear-gradient(90deg, #ef4444, #22c55e);"></div></div>         <div style="font-size:11px; color:var(--muted); margin-top:5px;">${info.n}</div>       </div>     `;   }).join("");    leftCard.innerHTML = `     <h2>测评报告</h2>     <p style="font-size:14px; color:var(--muted)">分数越高越“通”，分低越“卡”。建议针对性进行脚本练习。</p>     <div class="resultgrid">${dimHtml}</div>     <div class="hr"></div>     <div class="notice">提示：结果仅供参考。您可以将结果复制发给指导老师。</div>     <div style="display:flex; gap:10px; margin-top:20px;">       <button class="primary" onclick="copyResult()">复制详细得分</button>       <button onclick="location.reload()">重新测评</button>     </div>   `; }  window.copyResult = () => {   const dimSum = {Worth:0, Scarcity:0, Control:0, Victim:0, Limits:0};   state.answers.forEach((ans, i) => dimSum[questions[i].d] += ans);   const txt = `能量脚本得分(原始分/单维度满分36)：\n Worth: ${dimSum.Worth}\n Scarcity: ${dimSum.Scarcity}\n Control: ${dimSum.Control}\n Victim: ${dimSum.Victim}\n Limits: ${dimSum.Limits}`;   navigator.clipboard.writeText(txt).then(() => alert("已复制得分，请发送给您的老师。")); };  </script> </body> </html>

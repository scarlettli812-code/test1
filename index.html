<!doctype html> <html lang="zh-CN"> <head>   <meta charset="utf-8" />   <meta name="viewport" content="width=device-width,initial-scale=1" />   <title>能量脚本测评（深度解析版）</title>   <style>     :root{       --bg:#0b0f17; --card:#111827; --card2:#0f172a; --text:#e5e7eb; --muted:#9ca3af;       --accent:#8b5cf6; --accent2:#22c55e; --danger:#ef4444; --border:#1f2937;       --shadow: 0 10px 30px rgba(0,0,0,.35);       --radius: 18px;       --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;     }     *{box-sizing:border-box}     body{margin:0; background: radial-gradient(1200px 800px at 20% 10%, rgba(139,92,246,.28), transparent 60%), var(--bg); color:var(--text); font-family:system-ui, -apple-system, sans-serif; line-height:1.5;}     .wrap{max-width:980px; margin:0 auto; padding:22px;}     .topbar{display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:18px;}     .brand{display:flex; align-items:center; gap:10px;}     .logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg, #8b5cf6, #22c55e); box-shadow:var(--shadow);}     .title{font-size:18px; font-weight:700}     .pill{border:1px solid var(--border); background:rgba(17,24,39,.6); padding:8px 10px; border-radius:999px; font-size:12px; color:var(--muted);}     .grid{display:grid; grid-template-columns: 1.2fr .8fr; gap:16px;}     @media (max-width: 900px){ .grid{grid-template-columns: 1fr} }     .card{background:linear-gradient(180deg, rgba(17,24,39,.92), rgba(15,23,42,.92)); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:24px;}     .hr{height:1px;background:var(--border); margin:14px 0}     button{appearance:none; border:1px solid var(--border); background:rgba(17,24,39,.6); color:var(--text); padding:10px 14px; border-radius:14px; cursor:pointer; font-weight:650;}     button.primary{background:linear-gradient(135deg, #8b5cf6, #22c55e); border-color:transparent; color:white;}     button:disabled{opacity:.5; cursor:not-allowed;}     .input{ width:100%; border:1px solid var(--border); background:rgba(15,23,42,0.6); color:var(--text); padding:12px; border-radius:14px; outline:none; margin-bottom:10px;}     .tag{display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:999px; border:1px solid var(--border); background:rgba(17,24,39,0.55); font-size:12px; color:var(--muted);}     .progress{height:10px; background:rgba(31,41,55,.8); border:1px solid var(--border); border-radius:999px; overflow:hidden; margin:10px 0;}     .bar{height:100%; width:0%; background:linear-gradient(90deg, #8b5cf6, #22c55e); transition: width .3s;}     .options{display:flex; flex-direction:column; gap:10px; margin-top:20px;}     .opt{ text-align:left; padding:16px; border-radius:16px; border:1px solid var(--border); background:rgba(17,24,39,.55); cursor:pointer; font-size:15px; }     .opt.selected{ border-color: #22c55e; background: rgba(34,197,94,0.15); }     .resultgrid{display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:20px;}     @media (max-width: 720px){ .resultgrid{grid-template-columns:1fr} }     .metric{border:1px solid var(--border); background:rgba(15,23,42,.55); border-radius:16px; padding:16px;}     .meter{height:10px; border-radius:999px; background:rgba(31,41,55,.85); overflow:hidden;}     .error{padding:10px; border-radius:10px; border:1px solid rgba(239,68,68,0.35); background:rgba(239,68,68,0.12); color:#fca5a5; font-size:13px; margin-top:10px;}     .analysis-box{background:rgba(139,92,246,0.1); border-left:4px solid #8b5cf6; padding:15px; margin-top:15px; font-size:14px;}     .footer{margin-top:24px; color:var(--muted); font-size:12px; text-align:center;}   </style> </head> <body> <div class="wrap">   <div class="topbar">     <div class="brand"><div class="logo"></div><div><div class="title">能量脚本测评</div></div></div>     <div class="pill">进度：<strong id="pillProgress">0/60</strong></div>   </div>   <div class="grid">     <div class="card" id="leftCard">       <h2>能量脚本深度觉察</h2>       <p style="color:var(--muted)">这是一场关于潜意识脚本的深度扫描。通过 60 个微观体感题目，我们将还原你在金钱、关系、事业与身体上的真实能量地图。</p>     </div>     <div class="card" id="rightCard">       <label style="font-size:12px; color:var(--muted)">激活码</label>       <input id="codeInput" class="input" placeholder="请输入您的激活码" />       <button class="primary" style="width:100%" id="btnActivate">激活并开始</button>       <div id="activateMsg"></div>       <div class="hr"></div>       <p style="font-size:11px; color:var(--muted)">激活码仅供单人单次使用。一旦激活，题目将自动载入。</p>     </div>   </div> </div> <script>
/** =========================
 *  0) 100% 完整 60 题数据
 * ========================= */
const questions = [
    { d: 'Worth', s: 'Money', t: "当你几乎没有付出什么“辛苦努力”，却意外获得了一笔丰厚的奖金或馈赠（如中奖、长辈赠予），钱到账的那一瞬间，你的真实体感是？", o: ["A. 极度不安。感觉这钱“烫手”，甚至心慌意乱，觉得“天降横财必有横祸”，必须立刻花掉或转手送人才能心安。", "B. 怀疑与恐慌。“是不是搞错了？我不值这么多”，把钱存起来完全不敢动用，生怕之后会被追回。", "C. 略带压力。虽然收下了，但心里暗暗发誓“下次肯定没这种好事了”，或者觉得自己必须加倍努力工作来“配得上”这笔钱。", "D. 平静的惊喜。就像收到当月工资一样自然，开心地收下并规划用途，内心觉得“我有好运是很正常的事”."] },
    { d: 'Worth', s: 'Money', t: "当你终于下定决心买下那件昂贵但非必需的“梦中情物”（如名牌包、手表）后，把东西拿回家的那一小时内状态是？", o: ["A. 强烈的罪恶感。内心有个声音不断攻击自己“太败家、太虚荣”，甚至想立刻退货，心情比买之前更糟糕。", "B. 补偿心理。看着东西虽然喜欢，但立刻给自己制定“惩罚计划”——比如接下来的一个月必须吃土，通过“受苦”来赎罪。", "C. 需要理由。需要反复强调它的“实用性”和“保值率”，试图用逻辑说服大脑“这笔钱花得有道理”，不敢承认仅仅是因为喜欢。", "D. 纯粹的喜悦。欣赏它的质感，使用它时感到快乐和满足，完全没有关于价格的心理负担，也不会去想“回本”的事。"] },
    { d: 'Worth', s: 'Money', t: "当客户或老板主动提出给你“高于预期”报酬，且并没有附加额外工作要求时？", o: ["A. 下意识拒绝。“不不不，太多了，我不值这个价”，身体本能地想把机会往外推，收了反而会焦虑得睡不着。", "B. 恐慌性补偿。勉强收下但内心极度恐慌，拼命主动加班、赠送额外服务，必须让自己付出的辛苦程度“超过”这笔钱才安心。", "C. 窃喜带疑。开心是开心，但心里嘀咕“他们是不是不知道我其实没那么厉害”，担心以后露馅。", "D. 大方致谢。平静地确认“是的，我的专业能力和服务值得这个价格”，不卑不亢地收下。"] },
    { d: 'Scarcity', s: 'Money', t: "每月不得不支付房租、房贷或大额账单的那一瞬间，哪怕余额足够，你的身体感受是？", o: ["A. 躯体紧缩。胃部痉挛、胸口发闷，感觉这一笔钱付出去就像是在“割肉”或“放血”，瞬间产生一种“我要活不下去了”的濒死感。", "B. 怨气冲天。一边付款一边在心里咒骂“怎么这么贵”，通过愤怒来掩盖内心的无力感，付完款心情极差。", "C. 情感隔离。没什么痛感，但完全屏蔽了感觉，像机器一样快速划走，不敢去细想账户余额变少的事实。", "D. 轻松流动。内心舒展，感谢这笔钱换来了舒适的居住空间或服务，觉得这是一种公平且愉快的价值交换。"] },
    { d: 'Scarcity', s: 'Money', t: "刷朋友圈看到同龄人晒豪车、奢华旅行或巨额收益截图时，你脑海中冒出的第一个念头？", o: ["A. 恶意揣测。“肯定是不义之财/被包养/P图骗人的”，必须通过把对方“妖魔化”来维持内心的平衡。", "B. 瞬间萎缩。觉得自己是个废物，感叹“世界不公平”，焦虑感瞬间爆棚。", "C. 心理隔离。“挺好的，但这种生活离我很远”，潜意识里不相信自己能拥有。", "D. 欣赏与好奇。觉得“这挺酷的”，会好奇对方是怎么做到的，并将其视为一种可能性的参照。"] },
    { d: 'Scarcity', s: 'Money', t: "面对“满1000减200”或“买一送一”的大促活动，你通常会如何行动？", o: ["A. 恐慌性囤积。完全被“不买就是亏”的焦虑驱动，囤了一堆根本用不完的东西。", "B. 贪便宜心理。为了那个折扣，硬是凑单买了几件其实不太喜欢的商品，买完回家看着这些东西又觉得有点后悔。", "C. 轻微动摇。会被诱惑多看几眼，稍微多买一点日用品，但大体能控制在需求范围内。", "D. 核心聚焦。只买自己原本计划需要的高品质商品，完全不被折扣标签绑架。"] },
    { d: 'Control', s: 'Money', t: "对于你的存款余额或理财账户，你查看的频率和当下的心情是？", o: ["A. 强迫性查看。每天都要看好几次，数字稍微下跌一点都会让我极度恐慌，毁掉整天的心情。", "B. 依赖性查看。每天睡前或醒来必须看一眼，确认数字还在才能感到踏实，把它当成唯一的安全感来源。", "C. 定期复盘。每周或每月看一次，平时虽然不看，但遇到大环境不好时心里会有点打鼓。", "D. 信任与放手。长期持有，相信财富有它自己的增长周期。"] },
    { d: 'Control', s: 'Money', t: "如果有人向你推荐一个你完全不熟悉、但似乎很有潜力的赚钱新机会（非诈骗），你会？", o: ["A. 僵化防御。“不在我计划内的都是风险”，直接拒绝了解，坚信只有靠自己一步步规划的路径才安全。", "B. 焦虑纠结。想试又不敢试，反复分析利弊直到机会溜走。", "C. 谨慎观望。保持关注，但需要看到身边有人成功了，才敢小心翼翼地投入一点点。", "D. 开放评估。如果评估后觉得可行且有趣，会欣然尝试。"] },
    { d: 'Control', s: 'Money', t: "在一次旅行或项目中，因为不可抗力导致预算超支了20%，你的第一反应？", o: ["A. 情绪崩溃。暴怒或极度焦虑，觉得“一切都乱套了”，不停指责自己或同伴。", "B. 惩罚性止损。为了弥补这20%的缺口，强行砍掉后面所有精彩的体验项目。", "C. 事后反刍。虽然接受了现实，但心里始终有个疙瘩，时不时会念叨几句。", "D. 弹性调整。“既然发生了就是最好的安排”，相信这笔钱换来了独特的体验。"] },
    { d: 'Victim', s: 'Money', t: "哪怕深夜独自一人时，你认为目前阻碍你实现“财富自由”的最大原因是？", o: ["A. 宿命论。“因为我没有富爸爸/没背景/命不好”，认为阶级已经固化。", "B. 环境归因。“现在经济形势太差了/行业不行”，总是觉得外部条件在针对自己。", "C. 责任转移。“要不是为了家庭/孩子/伴侣，我早就飞黄腾达了”。", "D. 内控点。“是我当下的认知和能力还未匹配那个量级的财富”。"] },
    { d: 'Victim', s: 'Money', t: "假如遭遇了理财亏损或被人借钱不还，你的长期反应是？", o: ["A. 受害上瘾。逢人就诉苦，沉浸在“为什么倒霉的总是我”的悲情中。", "B. 情绪消耗。脑子里全是报复或怨恨的念头，消耗了大量精力去恨对方。", "C. 创伤残留。自认倒霉，但潜意识里留下了“人都会骗我钱”的阴影。", "D. 成长复盘。承认损失，反思是自己哪个贪念导致了决策，吸取教训迅速翻篇。"] },
    { d: 'Victim', s: 'Money', t: "当你有机会进入一个高净值人群（富人）的社交场合，你的真实心态是？", o: ["A. 被迫害妄想。“他们肯定看不起我/想割我韭菜”，全程保持防御，想逃离。", "B. 自我矮化。“人家都是资源互换，我啥也没有”，躲在角落不敢说话。", "C. 虚假自我。觉得自己低人一等，需要通过伪装或夸大实力才能被接纳。", "D. 自信配对。“既然我在这里，说明我的能量与此匹配”。"] },
    { d: 'Limits', s: 'Money', t: "闭上眼，试着想象你的年收入突然翻了10倍，随之而来的第一个念头是？", o: ["A. 代价恐惧。“那一定会累死/失去健康/家庭破裂”，深信巨富必须用巨大牺牲交换。", "B. 理性扼杀。“这根本不科学/不可能”，大脑立即寻找证据证明这是幻想。", "C. 勤劳陷阱。“那我得打多少份工啊？”，只想着用现有辛苦模式堆叠。", "D. 愿景接纳。感觉到轻松和自由，觉得“这就是我未来的自然状态”。"] },
    { d: 'Limits', s: 'Money', t: "在你的潜意识深处，关于“善良/人品”与“有钱”的关系，你更倾向于相信？", o: ["A. 道德审判。“为富不仁，想赚大钱就得心狠手辣”，做好人注定清贫。", "B. 清高防御。“谈钱太俗了”，认为追求财富会玷污灵魂的纯洁度。", "C. 风险预设。钱是中性的，但还是觉得虽然有了钱不一定变坏，但会带来麻烦。", "D. 能量中性。“钱是中性的放大镜”，它会让善良的人更有能力行善。"] },
    { d: 'Limits', s: 'Money', t: "面对“轻松赚钱”、“被动收入”这些概念时，你的真实想法？", o: ["A. 苦行僧思维。“这都是投机取巧”，坚信只有流汗辛苦赚来的钱才是干净的。", "B. 自我设限。“可能有这种事，但我没那个命”，觉得那是天才的特权。", "C. 知行脱节。想要相信，但不知道怎么做，行动上还是习惯苦干。", "D. 杠杆思维。“赚钱可以是充满创造力且愉悦的”，相信只要找对杠杆财富自然流向我。"] },
    { d: 'Worth', s: 'Rel', t: "当伴侣或异性极其真诚、热烈地赞美你（如夸赞你的魅力或才华）时，你的反应？", o: ["A. 防御抵触。浑身不自在，觉得对方要么是在讽刺我，要么是有所图。", "B. 冒充者综合征。尴尬转移视线，心里立刻列举出一堆缺点来反驳对方。", "C. 接受障碍。礼貌谢但心里没吃进去，觉得他带了滤镜。", "D. 自我确认。全然接收，眼神发光地享受这份能量流动。"] },
    { d: 'Worth', s: 'Rel', t: "你已非常疲惫，但伴侣提出希望你做家务或满足某种情感需求时？", o: ["A. 讨好牺牲。强撑着去做，内心委屈，“一旦拒绝就不值得被爱了”。", "B. 边界模糊。虽然拒绝了，但随后陷入长时间内疚，生怕对方生气。", "C. 解释冲动。会拒绝但需要罗列一堆理由证明自己情有可原。", "D. 安全依恋。温和坚定表达需要休息，相信关系能容纳彼此。"] },
    { d: 'Worth', s: 'Rel', t: "假如一个各方面条件都极好、甚至近乎完美的潜在对象对你表示强烈好感？", o: ["A. 回避型防御。本能想冷处理，觉得“不属于我/我配不上”。", "B. 焦虑型破坏。患得患失，故意发脾气测试对方离开。", "C. 防御性悲观。小心翼翼接触，时刻提醒自己“别抱太大希望”。", "D. 自信接纳。兴奋且坦然，觉得我们就该是同一个世界的人。"] },
    { d: 'Scarcity', s: 'Rel', t: "当伴侣因为忙碌回复信息比平时晚了几个小时且未提前告知？", o: ["A. 依恋焦虑爆发。疯狂发消息，脑补出轨，陷入被抛弃感。", "B. 思维强迫。虽不吵闹但心神不宁，每隔几分钟看一次手机。", "C. 轻度依赖。理智知道在忙，但情绪上感到失落不满。", "D. 独立自我。安住当下，完全信任对方，享受这段独处。"] },
    { d: 'Scarcity', s: 'Rel', t: "在聚会上，看到伴侣和一位有魅力的异性朋友谈笑风生，你的内心？", o: ["A. 占有欲失控。嫉妒中烧，觉得自尊受辱，当场黑脸或大发雷霆。", "B. 侦探模式。表面大度，回家开始查手机寻找蛛丝马迹。", "C. 竞争焦虑。稍微有点酸，忍不住拿自己比较，需要被哄。", "D. 核心自信。毫无波澜，甚至欣赏伴侣社交魅力。"] },
    { d: 'Scarcity', s: 'Rel', t: "当你处于单身状态，或者想象自己长期单身，潜意识深处感觉？", o: ["A. 寄生心理。像末日，觉得注定孤独终老，想要随便抓人填空虚。", "B. 市场论。觉得“好人都挑光了”，如果不抓紧就没机会了。", "C. 环境压力。看到秀恩爱受刺激，着急一下。", "D. 自足圆满。享受单身，相信最好的在路上，宁缺毋滥。"] },
    { d: 'Control', s: 'Rel', t: "原定的约会计划因对方原因临时大改动，你会？", o: ["A. 秩序偏执。雷霆震怒，觉得对方不可理喻，情绪彻底崩溃。", "B. 隐性惩罚。勉强同意但全程黑脸，唠叨让大家玩不开心。", "C. 情绪惯性。叹口气，需一点时间消化不快，再重新规划。", "D. 弹性接纳。“也许这是更好的惊喜”，迅速调整心态。"] },
    { d: 'Control', s: 'Rel', t: "面对伴侣身上你看不惯的生活习惯（如品味、说话方式）？", o: ["A. 控制狂。改造工程，讲道理、指责，不改就上升到“你不爱我”。", "B. 被动攻击。隐形施压，皱眉营造低气压，虽然不说明说。", "C. 轻度干涉。提过几次建议，如果实在改不了，心里嫌弃。", "D. 界限清晰。尊重差异，完全尊重对方的生活方式。"] },

/** =========================
 *  1) 状态与 UI 引用
 * ========================= */
let state = { activated: false, idx: 0, answers: Array(questions.length).fill(null) };
const DIMENSIONS = ["Worth","Scarcity","Control","Victim","Limits"];

const leftCard = document.getElementById("leftCard");
const rightCard = document.getElementById("rightCard");
const codeInput = document.getElementById("codeInput");
const btnActivate = document.getElementById("btnActivate");
const activateMsg = document.getElementById("activateMsg");
const pillProgress = document.getElementById("pillProgress");

/** =========================
 *  2) 核心逻辑：激活
 * ========================= */
btnActivate.addEventListener("click", async () => {
  const code = codeInput.value.trim();
  if(!code) return;
  btnActivate.disabled = true;
  btnActivate.textContent = "正在验证...";
  try {
    const res = await fetch("/api/redeem", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ code })
    });
    const data = await res.json();
    if(data.ok) {
      state.activated = true;
      rightCard.style.display = "none";
      renderQuiz();
    } else {
      activateMsg.innerHTML = `<div class="error">${data.msg}</div>`;
    }
  } catch (e) {
    activateMsg.innerHTML = `<div class="error">网络异常，请联系客服。</div>`;
  } finally {
    btnActivate.disabled = false;
    btnActivate.textContent = "激活并开始";
  }
});

/** =========================
 *  3) 渲染题目
 * ========================= */
function renderQuiz() {
  const q = questions[state.idx];
  const done = state.answers.filter(x => x !== null).length;
  const pct = Math.round((done / questions.length) * 100);
  pillProgress.textContent = `${done}/${questions.length}`;

  leftCard.innerHTML = `
    <div style="margin-bottom:12px;">
       <span class="tag"><b>领域</b> ${q.s}</span>
       <span class="tag"><b>维度</b> ${q.d}</span>
    </div>
    <h2 style="margin-top:0; font-size:19px; line-height:1.5;">${q.t}</h2>
    <div class="progress"><div class="bar" style="width:${pct}%"></div></div>
    <div class="options">
        ${q.o.map((text, i) => `
            <div class="opt ${state.answers[state.idx] === i ? 'selected' : ''}" onclick="pick(${i})">
                ${text}
            </div>
        `).join("")}
    </div>
    <div style="margin-top:24px; display:flex; justify-content:space-between;">
        <button onclick="prev()" ${state.idx === 0 ? 'disabled' : ''}>← 上一题</button>
        ${done === questions.length ? '<button class="primary" onclick="renderResult()">查看深度解析 →</button>' : ''}
    </div>
  `;
}

window.pick = (i) => {
  state.answers[state.idx] = i;
  if(state.idx < questions.length - 1) {
    state.idx++;
    renderQuiz();
  } else {
    renderQuiz();
  }
};

window.prev = () => { if(state.idx > 0) { state.idx--; renderQuiz(); } };

/** =========================
 *  4) 解析计算与渲染结果
 * ========================= */
function renderResult() {
  const dimSum = {Worth:0, Scarcity:0, Control:0, Victim:0, Limits:0};
  const sphereSum = {Money:0, Rel:0, Career:0, Body:0};
  
  state.answers.forEach((ans, i) => {
    const q = questions[i];
    dimSum[q.d] += ans;
    sphereSum[q.s] += ans;
  });

  const interpret = (pct) => {
    if(pct >= 80) return { l:"通透", c:"#22c55e", d:"此维度脚本已松动，能量流动自然，较少被旧信念阻碍。" };
    if(pct >= 60) return { l:"稳定", c:"#a855f7", d:"大体稳定，但在压力情境下仍会触发潜意识防御。" };
    if(pct >= 40) return { l:"敏感", n:"#eab308", d:"容易被外界触发，存在明显的紧缩感，需加强意识练习。" };
    return { l:"卡点", c:"#ef4444", d:"此维度脚本较厚，常以受害/控制方式进行自我保护，是主要突破点。" };
  };

  const dimHtml = DIMENSIONS.map(d => {
    const score = dimSum[d];
    const pct = Math.round((score / 36) * 100);
    const info = interpret(pct);
    return `
      <div class="metric">
        <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:14px;">
           <span>${d}（${info.l}）</span>
           <span>${pct}%</span>
        </div>
        <div class="meter"><div style="width:${pct}%; height:100%; background:${info.c};"></div></div>
        <div style="font-size:11px; color:var(--muted); margin-top:6px;">解析：${info.d}</div>
      </div>
    `;
  }).join("");

  const sphereHtml = Object.keys(sphereSum).map(s => {
      const score = sphereSum[s];
      const pct = Math.round((score / 45) * 100);
      return `<span class="tag"><b>${s}</b> ${pct}%</span>`;
  }).join(" ");

  leftCard.innerHTML = `
    <h2 style="margin-top:0;">深度能量地图</h2>
    <div style="margin-bottom:15px;">领域平衡度：${sphereHtml}</div>
    <div class="resultgrid">${dimHtml}</div>
    <div class="hr"></div>
    <div class="analysis-box">
       <strong>综合诊断意见：</strong><br/>
       你的主要脚本卡点位于 <b>${Object.entries(dimSum).sort((a,b)=>a[1]-b[1])[0][0]}</b> 维度。
       建议通过“一致性沟通”与“身体接纳练习”来松动旧有载具，让财富与爱重新流动。
    </div>
    <div style="margin-top:20px; display:flex; gap:10px;">
       <button class="primary" onclick="copyRes()">复制报告给指导老师</button>
       <button onclick="location.reload()">重新测评</button>
    </div>
  `;
}

window.copyRes = () => {
    const dimSum = {Worth:0, Scarcity:0, Control:0, Victim:0, Limits:0};
    state.answers.forEach((ans, i) => dimSum[questions[i].d] += ans);
    const txt = `能量脚本深度报告：\nWorth: ${dimSum.Worth} | Scarcity: ${dimSum.Scarcity} | Control: ${dimSum.Control} | Victim: ${dimSum.Victim} | Limits: ${dimSum.Limits}\n(总计60题，维度满分36，得分越高越通透)`;
    navigator.clipboard.writeText(txt).then(() => alert("详细得分已复制，请发送给您的老师进行深度解析。"));
};
</script> </body> </html>
